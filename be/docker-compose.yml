services:
  backend:
    build: .
    container_name: raise_backend
    restart: always
    env_file:
      - ./.env.production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:latest
    container_name: postgres_raise_db
    restart: always
    environment:
      POSTGRES_USER: root # user mặc định
      POSTGRES_PASSWORD: passed # password mặc định
      POSTGRES_DB: taskmanager # tên database mặc định khi start
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
